services:
  mysql:
    image: mysql:8.4
    container_name: telegram-ai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: telegram_ai_character
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - /opt/telegram-ai-character/data/mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: telegram-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - /opt/telegram-ai-character/data/redis:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
