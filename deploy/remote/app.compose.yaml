name: telegram-ai-stack

services:
  mysql:
    image: mysql:8.4
    container_name: telegram-ai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: telegram_ai_character
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - /opt/telegram-ai-character/data/mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - mysql

  redis:
    image: redis:7-alpine
    container_name: telegram-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - /opt/telegram-ai-character/data/redis:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - redis

  text2vec-transformers:
    image: cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2
    container_name: telegram-ai-text2vec
    restart: unless-stopped

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.31.3
    container_name: telegram-ai-weaviate
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: 20
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      ENABLE_MODULES: text2vec-transformers
      TRANSFORMERS_INFERENCE_API: http://text2vec-transformers:8080
      CLUSTER_HOSTNAME: node1
    volumes:
      - /opt/telegram-ai-character/data/weaviate:/var/lib/weaviate
    depends_on:
      - text2vec-transformers
    networks:
      default:
        aliases:
          - weaviate

  bot:
    build:
      context: /opt/telegram-ai-character/current
      dockerfile: services/bot/Dockerfile
    image: telegram-ai-bot:latest
    container_name: telegram-ai-bot
    restart: unless-stopped
    env_file:
      - /opt/telegram-ai-character/env.bot
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started

  api:
    build:
      context: /opt/telegram-ai-character/current
      dockerfile: services/api/Dockerfile
    image: telegram-ai-api:latest
    container_name: telegram-ai-api
    restart: unless-stopped
    env_file:
      - /opt/telegram-ai-character/env.api
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started
    ports:
      - "8091:8090"

  webapp:
    build:
      context: /opt/telegram-ai-webapp/current
      dockerfile: Dockerfile
    image: telegram-ai-webapp:latest
    container_name: telegram-ai-webapp
    restart: unless-stopped
    ports:
      - "80:8090"

  miniapp-gateway:
    image: nginx:1.27-alpine
    container_name: telegram-ai-miniapp-gateway
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/telegram-ai-character/miniapp-nginx.conf:/etc/nginx/nginx.conf:ro
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

  miniapp-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: telegram-ai-miniapp-tunnel
    restart: unless-stopped
    network_mode: host
    command:
      - tunnel
      - --no-autoupdate
      - --url
      - http://127.0.0.1:8088

networks:
  default:
    external: true
    name: deploy_default
